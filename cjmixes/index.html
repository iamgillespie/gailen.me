<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Audio Player - CJ Mixes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1c1e21;
            color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        /* Webamp centers neatly inside this block element */
        #winamp-container {
            position: relative;
            min-height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center text-center mb-4">
        <div class="col-md-8">
            <h1 class="display-6 fw-bold text-white mb-2">Creepy Jingles mix previews</h1>
            <p class="small text-white">Creepy Jingles is whipping the llama's ass.</p>
            <hr class="border-secondary opacity-25">
        </div>
    </div>

    <!-- Winamp Target Container -->
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <div id="winamp-container"></div>
        </div>
    </div>
</div>

<!-- Load Webamp as an ES Module -->
<script type="module">
    import Webamp from "https://unpkg.com/webamp@^2";

    const webamp = new Webamp({
        // FIXED: Using relative paths since HTML and MP3s live together in /cjmixes/
        initialTracks: [
            {
                metaData: { title: "Fables_002 (No Edits)" },
                url: "./Fables_002-No-edits-from-Joseph.mp3"
            },
            {
                metaData: { title: "Rice_001 (Joseph Edits)" },
                url: "./Rice_001-joseph-edits.mp3"
            },
            {
                metaData: { title: "Trend_002 (Bury the Tambo)" },
                url: "./Trend_002-joseph%20edits%20bury%20the%20tambo.mp3"
            },
            {
                metaData: { title: "Trend_002 (Joseph Edits)" },
                url: "./Trend_002-joseph%20edits.mp3"
            },
            {
                metaData: { title: "Funhouse (Joseph Edits)" },
                url: "./funhouse-joseph-edits.mp3"
            },
            {
                metaData: { title: "idnat_003 (No Plunkies V1)" },
                url: "./idnat_003-joseph-edits-no-plunkies%20in%20verse%201.mp3"
            },
            {
                metaData: { title: "idnat_003 (Joseph Edits)" },
                url: "./idnat_003-joseph-edits.mp3"
            },
            {
                metaData: { title: "Stayhigh_001 (Joseph Edits)" },
                url: "./stayhigh_001-joseph%20edits.mp3"
            },
            {
                metaData: { title: "Stayhigh_001 (Ooohs & Aaaahs Mid Tweak)" },
                url: "./stayhigh_001-joseph%20edits_001%20ooohs%20and%20aaaaahs%20middle%20a%20little%20less%20turned%20down.mp3"
            },
            {
                metaData: { title: "Stayhigh_001 (Ooohs & Aaaahs -9db)" },
                url: "./stayhigh_001-joseph%20edits_001-lowered%20ooohs%20and%20aaaahs%20by%209db.mp3"
            }
        ],
    });

    // Render inside the Bootstrap shell
    webamp.renderWhenReady(document.getElementById('winamp-container'));
</script>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
